<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" role="img" aria-labelledby="title desc">
  <title id="title">Hello, Bimmer! Parts Store</title>
  <desc id="desc">Stylized Hello, Bimmer! wordmark with BMW-inspired O symbol</desc>
  <defs>
    <style>
      .bubble {
        font-family: Impact, "Arial Black", "Segoe UI", sans-serif;
        font-weight: 900;
        letter-spacing: 1px;
        fill: #19c8ff;
        stroke: #0a1431;
        stroke-width: 10;
        paint-order: stroke fill;
        stroke-linejoin: round;
      }
      .shadow {
        fill: #050816;
        opacity: 0.95;
      }
      .script {
        font-family: "Segoe Script", "Brush Script MT", cursive;
        font-size: 64px;
        font-weight: 700;
        fill: #0b101a;
        letter-spacing: 1px;
      }
    </style>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <clipPath id="bimmer-o-center-clip">
      <circle cx="0" cy="0" r="25" />
    </clipPath>
  </defs>

  <!-- HELLO line shadow -->
  <g filter="url(#soft-shadow)">
    <text class="bubble shadow" x="64" y="118" font-size="116" transform="rotate(-5 64 118)">HELL</text>
    <text class="bubble shadow" x="520" y="126" font-size="116" transform="rotate(-5 520 126)">,</text>
  </g>

  <!-- BMW-inspired O (with shadow offset) -->
  <g transform="translate(450 92) rotate(-5)" filter="url(#soft-shadow)">
    <g transform="translate(8 9)">
      <circle r="58" fill="#050816"/>
    </g>
    <circle r="58" fill="#0d1737" stroke="#071024" stroke-width="9"/>
    <circle r="46" fill="#19c8ff" stroke="#071024" stroke-width="10"/>
    <g clip-path="url(#bimmer-o-center-clip)">
      <rect x="-25" y="-25" width="25" height="25" fill="#ffffff"/>
      <rect x="0" y="-25" width="25" height="25" fill="#24b9ff"/>
      <rect x="-25" y="0" width="25" height="25" fill="#24b9ff"/>
      <rect x="0" y="0" width="25" height="25" fill="#ffffff"/>
    </g>
    <circle r="25" fill="none" stroke="#071024" stroke-width="4"/>
    <line x1="0" y1="-25" x2="0" y2="25" stroke="#071024" stroke-width="4"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#071024" stroke-width="4"/>
  </g>

  <!-- HELLO line foreground -->
  <text class="bubble" x="54" y="108" font-size="116" transform="rotate(-5 54 108)">HELL</text>
  <text class="bubble" x="510" y="116" font-size="116" transform="rotate(-5 510 116)">,</text>

  <!-- BIMMER line shadow -->
  <g filter="url(#soft-shadow)">
    <text class="bubble shadow" x="72" y="250" font-size="132" transform="rotate(3 72 250)">BIMMER!</text>
  </g>

  <!-- BIMMER line foreground -->
  <text class="bubble" x="62" y="240" font-size="132" transform="rotate(3 62 240)">BIMMER!</text>

  <!-- subline -->
  <text class="script" x="230" y="320" transform="rotate(-2 230 320)">PARTS STORE</text>
</svg>
